name: OpenAPI Validate

on:
  push:
    branches: [main]
    paths:
      - "app/static/openapi.json"
      - "app/static/agent.json"
  pull_request:
    branches: [main]
    paths:
      - "app/static/openapi.json"
      - "app/static/agent.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint app/static/openapi.json --extends minimal

      - name: Validate agent.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('app/static/agent.json','utf8')); console.log('agent.json: valid')"
