name: Simulation Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  simulation-visual:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Build browser-native CLI assets
        working-directory: app/static
        run: npm run build

      - name: Run BAU simulation with summary and SVG plot
        run: |
          cd app/static
          npm run -s browser-native:cli -- --summary > ../../sim_summary.txt
          npm run -s browser-native:cli -- --plot-svg ../../world3_bau.svg

      - name: Commit plot to branch
        id: publish_plot
        run: |
          mkdir -p .github/assets
          cp world3_bau.svg .github/assets/simulation-bau.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/simulation-bau.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update BAU simulation plot [skip ci]"
            git push
          fi
          echo "asset_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with inline image
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const sha = context.sha.substring(0, 7);
            const assetSha = '${{ steps.publish_plot.outputs.asset_sha }}';

            const imgUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${assetSha}/.github/assets/simulation-bau.svg`;
            const summary = fs.readFileSync('sim_summary.txt', 'utf8');

            const body = [
              '## Simulation Check',
              '',
              'BAU scenario executed successfully on this branch.',
              '',
              '<details>',
              '<summary><strong>Simulation Summary</strong> (click to expand)</summary>',
              '',
              '```',
              summary.trim(),
              '```',
              '',
              '</details>',
              '',
              '### BAU Scenario Plot',
              '',
              `![World3 BAU Simulation](${imgUrl})`,
              '',
              '---',
              `_Generated automatically by CI on commit \`${sha}\`_`
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = comments.data.find(c =>
              c.body.startsWith('## Simulation Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body
              });
            }

      - name: Upload plot artifact
        uses: actions/upload-artifact@v4
        with:
          name: bau-simulation-plot
          path: world3_bau.svg
