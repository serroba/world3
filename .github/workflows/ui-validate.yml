name: UI Validation

on:
  push:
    branches: [main]
    paths:
      - "app/static/**"
  pull_request:
    branches: [main]
    paths:
      - "app/static/**"

permissions:
  contents: read

jobs:
  ts-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Type-check TypeScript
        working-directory: app/static
        run: npm run typecheck

      - name: Run TypeScript tests with coverage
        working-directory: app/static
        run: npm run test:coverage

  generated-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Verify generated UI assets are up to date
        working-directory: app/static
        run: |
          npm run build
          git diff --exit-code js/browser-native.js
          git diff --exit-code js/model-data.js
          git diff --exit-code js/simulation-contracts.js
          git diff --exit-code js/simulation-provider.js

  static-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Validate HTML
        run: npx --yes htmlhint@latest app/static/index.html

      - name: Lint JavaScript
        working-directory: app/static
        run: npx --yes eslint@latest js/

      - name: Check referenced assets exist
        run: |
          cd app/static
          status=0
          for path in $(grep -oP '(?:src|href)="/\K[^"]+' index.html); do
            if [ ! -f "./${path}" ]; then
              echo "::error::Missing asset referenced in index.html: /${path}"
              status=1
            fi
          done
          exit $status

      - name: Verify no console.log left in production code
        run: |
          if grep -rn 'console\.log' app/static/js/ --include='*.js'; then
            echo "::warning::Found console.log statements in JS files"
          fi
