name: UI Validation

on:
  push:
    branches: [main]
    paths:
      - "app/static/**"
  pull_request:
    branches: [main]
    paths:
      - "app/static/**"

permissions:
  contents: read

jobs:
  ts-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Type-check TypeScript
        working-directory: app/static
        run: npm run typecheck

      - name: Run TypeScript tests with coverage
        working-directory: app/static
        run: npm run test:coverage

  browser-native-cli:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Build browser-native CLI assets
        working-directory: app/static
        run: npm run build

      - name: Run browser-native CLI summary and SVG render
        working-directory: app/static
        run: |
          npm run browser-native:cli -- --summary --plot-svg /tmp/world3-browser-native.svg
          test -f /tmp/world3-browser-native.svg

  generated-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Verify TypeScript compiles to JS successfully
        working-directory: app/static
        run: npm run build

  static-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/static/package-lock.json

      - name: Install UI dependencies
        working-directory: app/static
        run: npm ci

      - name: Build compiled JS from TypeScript
        working-directory: app/static
        run: npm run build

      - name: Validate HTML
        run: npx --yes htmlhint@latest app/static/index.html

      - name: Lint JavaScript
        working-directory: app/static
        run: npx --yes eslint@latest js/

      - name: Check referenced assets exist
        run: |
          cd app/static
          status=0
          for path in $(grep -oP '(?:src|href)="\K(?!https?:|#|/[a-z])[^"]+' index.html); do
            if [ "$path" = "/" ]; then continue; fi
            if [ ! -f "./${path}" ]; then
              echo "::error::Missing asset referenced in index.html: ${path}"
              status=1
            fi
          done
          exit $status

      - name: Validate sitemap.xml
        run: |
          cd app/static
          status=0

          # Must be valid XML
          if ! python3 -c "import xml.etree.ElementTree as ET; ET.parse('sitemap.xml')" 2>/dev/null; then
            echo "::error::sitemap.xml is not valid XML"
            status=1
          fi

          # No hash fragments
          if grep -q '/#' sitemap.xml; then
            echo "::error::sitemap.xml contains hash fragment URLs (use clean paths)"
            status=1
          fi

          # All URLs must use the canonical domain
          if grep '<loc>' sitemap.xml | grep -qv 'https://limits.world'; then
            echo "::error::sitemap.xml contains URLs not on https://limits.world"
            status=1
          fi

          # Every registered route must be in the sitemap
          for route in / /history /faq /model /explore /compare /advanced /calibrate /what-is-world3 /limits-to-growth-model /world3-scenarios; do
            if ! grep -q "limits.world${route}<" sitemap.xml; then
              echo "::error::sitemap.xml missing route: ${route}"
              status=1
            fi
          done

          # Every sitemap URL path must match a registered route in app.js
          for url in $(grep -oP '<loc>\K[^<]+' sitemap.xml); do
            path=$(echo "$url" | sed 's|https://limits.world||')
            if [ "$path" = "/" ]; then continue; fi
            if ! grep -q "\"${path}\"" js/app.js; then
              echo "::error::sitemap.xml has URL ${url} with no matching route in app.js"
              status=1
            fi
          done

          echo "Sitemap validation: $(grep -c '<loc>' sitemap.xml) URLs checked"
          exit $status

      - name: Verify no console.log left in production code
        run: |
          if grep -rn 'console\.log' app/static/js/ --include='*.js'; then
            echo "::warning::Found console.log statements in JS files"
          fi
