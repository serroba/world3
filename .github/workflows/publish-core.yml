name: Publish @world3/core

on:
  push:
    tags:
      - "core-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci

      - name: Build
        working-directory: packages/core
        run: npm run build

      - name: Verify package version matches tag
        working-directory: packages/core
        run: |
          TAG="${GITHUB_REF#refs/tags/core-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag core-v${TAG} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Publishing @world3/core@${PKG_VERSION}"

      - name: Publish to npm (Trusted Publishing via OIDC)
        working-directory: packages/core
        run: npm publish --provenance --access public
