name: Container Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t world3:smoke .

      - name: Start container
        run: docker run -d --name w3 -p 8000:8000 world3:smoke

      - name: Wait for ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 15s"
          exit 1

      - name: Verify HTML served
        run: |
          body=$(curl -sf http://localhost:8000/)
          echo "$body" | grep -q "World3"

      - name: Verify static assets
        run: |
          curl -sf http://localhost:8000/js/browser-native.js > /dev/null
          curl -sf http://localhost:8000/css/variables.css > /dev/null
          curl -sf http://localhost:8000/data/functions-table-world3.json > /dev/null

      - name: Container logs on failure
        if: failure()
        run: docker logs w3 2>/dev/null || true

      - name: Teardown
        if: always()
        run: docker rm -f w3
